# notification-service — Namespace: backend — Port: 3006
# Depends on: mysql (data), rabbitmq (data)
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: backend
  labels:
    app: notification-service
spec:
  ports:
    - port: 3006
      targetPort: 3006
  selector:
    app: notification-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: backend
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z mysql.data.svc.cluster.local 3306; do echo "Waiting for MySQL..."; sleep 3; done']
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq.data.svc.cluster.local 5672; do echo "Waiting for RabbitMQ..."; sleep 3; done']
      containers:
        - name: notification-service
          image: aswin2003/notification-service:latest   # TODO: replace aswin2003
          imagePullPolicy: Always
          ports:
            - containerPort: 3006
          env:
            - name: PORT
              value: "3006"
            - name: SERVICE_NAME
              value: notification-service
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: DB_PASS
            - name: MQ_URL
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: MQ_URL
          startupProbe:
            httpGet:
              path: /health/startup
              port: 3006
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 3006
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 3006
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
