# loan-service — Namespace: backend — Port: 3005
# Depends on: mysql (data), rabbitmq (data), account-service (backend)
apiVersion: v1
kind: Service
metadata:
  name: loan-service
  namespace: backend
  labels:
    app: loan-service
spec:
  ports:
    - port: 3005
      targetPort: 3005
  selector:
    app: loan-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-service
  namespace: backend
  labels:
    app: loan-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loan-service
  template:
    metadata:
      labels:
        app: loan-service
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z mysql.data.svc.cluster.local 3306; do echo "Waiting for MySQL..."; sleep 3; done']
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq.data.svc.cluster.local 5672; do echo "Waiting for RabbitMQ..."; sleep 3; done']
        - name: wait-for-account
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -qO- http://account-service:3002/health/startup 2>/dev/null | grep -q UP; do echo "Waiting for account-service..."; sleep 5; done']
      containers:
        - name: loan-service
          image: area51devops/banking-app-loan-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
          env:
            - name: PORT
              value: "3005"
            - name: SERVICE_NAME
              value: loan-service
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: DB_PASS
            - name: MQ_URL
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: MQ_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: JWT_SECRET
            - name: ACCOUNT_SVC_URL
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: ACCOUNT_SVC_URL
          startupProbe:
            httpGet:
              path: /health/startup
              port: 3005
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "400m"
              memory: "256Mi"
