# frontend — Namespace: frontend — Port: 80
# nginx serves the React SPA. ConfigMap (config/nginx-config.yaml) is mounted
# over the default nginx.conf to provide:
#   - SPA routing (try_files fallback)
#   - Fallback proxy for /api/payment/ and /api/notify/ (not in Gateway routes)
# Primary API routes (/api/user, /api/account, /api/tx, /api/loan, /api/report)
# are intercepted by Kgateway BEFORE reaching this pod.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: frontend
  labels:
    app: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
        - name: wait-for-user-service
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -qO- http://user-service.backend.svc.cluster.local:3001/health/startup 2>/dev/null | grep -q UP; do echo "Waiting for user-service..."; sleep 5; done']
        - name: wait-for-account-service
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -qO- http://account-service.backend.svc.cluster.local:3002/health/startup 2>/dev/null | grep -q UP; do echo "Waiting for account-service..."; sleep 5; done']
      containers:
        - name: frontend
          image: aswin1015/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config   # from config/nginx-config.yaml (frontend namespace)
