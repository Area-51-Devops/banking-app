# ─────────────────────────────────────────────────────────────────────────────
# Secrets — all in one file, split by namespace
# Apply: kubectl apply -f config/secrets.yaml
#
# Re-encode:  echo -n 'value' | base64
# ─────────────────────────────────────────────────────────────────────────────

# data namespace — MySQL root password + RabbitMQ creds (used by infra pods)
apiVersion: v1
kind: Secret
metadata:
  name: data-secrets
  namespace: data
type: Opaque
data:
  DB_ROOT_PASSWORD: cm9vdHBhc3N3b3Jk   # rootpassword
  RABBITMQ_USER: Z3Vlc3Q=               # guest
  RABBITMQ_PASS: Z3Vlc3Q=               # guest

---
# backend namespace — DB app credentials, JWT secret, MQ creds (used by microservices)
apiVersion: v1
kind: Secret
metadata:
  name: banking-secrets
  namespace: backend
type: Opaque
data:
  DB_USER: cm9vdA==                          # root
  DB_PASS: cm9vdHBhc3N3b3Jk                 # rootpassword
  JWT_SECRET: bmV4dXNfYmFua2luZ19zZWNyZXQ=  # nexus_banking_secret
  RABBITMQ_USER: Z3Vlc3Q=                    # guest
  RABBITMQ_PASS: Z3Vlc3Q=                    # guest
