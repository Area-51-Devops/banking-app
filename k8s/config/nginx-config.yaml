# ─────────────────────────────────────────────────────────────────────────────
# nginx ConfigMap for the frontend pod
# Namespace: frontend
#
# ROUTING STRATEGY:
#   All API routing is handled centrally by Kgateway HTTPRoutes:
#     /api/user/, /api/account/, /api/tx/, /api/loan/, /api/report/,
#     /api/payment/, /api/notify/
#
#   Nginx responsibilities (frontend pod only):
#     1. Serve the static SPA bundle (React/Angular/Vue)
#     2. SPA client-side routing fallback (try_files → index.html)
#     3. Static asset caching (js, css, images, fonts)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: frontend
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      # ── SPA routing ──────────────────────────────────────────────────────
      # All /api/* paths are intercepted by Kgateway before reaching nginx.
      # This location serves the SPA shell for all non-asset client routes.
      location / {
        try_files $uri /index.html;
      }

      # ── Static asset caching ──────────────────────────────────────────────
      location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri /index.html;
      }
    }
