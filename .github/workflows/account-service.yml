name: Account-Service-CI

on:
  push:
    paths:
      - 'services/account-service/**'
  pull_request:
    paths:
      - 'services/account-service/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/account-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: services/account-service/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('services/account-service/package-lock.json') }}


      - name: Install dependencies
        run: npm ci

      - name: Snyk Scan
        uses: snyk/actions/node@master
        with:
          command: test
          args: --file=services/account-service/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Build
        run: npm run build

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/account-service:latest .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/account-service:latest
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/account-service:latest