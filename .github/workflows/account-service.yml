name: Account-Service-CI

on:
  push:
    paths:
      - 'services/account-service/**'
  pull_request:
    paths:
      - 'services/account-service/**'
  workflow_dispatch:

jobs:
  call-common:
    uses: ./.github/workflows/common-ci.yml
    with:
      working_directory: services/account-service
      image_name: account-service
      dockerfile_path: services/account-service/
      build_context: services
      run_build: true
      sonar_project_key: account-service   # ✅ unique Sonar project

    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}