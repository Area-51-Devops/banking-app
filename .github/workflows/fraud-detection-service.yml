name: Fraud-Detection-Service-CI

on:
  push:
    paths:
      - 'services/fraud-detection-service/**'
  pull_request:
    paths:
      - 'services/fraud-detection-service/**'

  workflow_dispatch:
    

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/fraud-detection-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: services/fraud-detection-service/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('services/fraud-detection-service/package-lock.json') }}

      - name: Install dependencies
        run: npm install

      - name: Snyk Scan
        uses: snyk/actions/node@master
        with:
          command: test
          args: --file=services/fraud-detection-service/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Build (optional)
        run: npm run build || echo "No build step"

      - name: Build Docker Image
        working-directory: services
        run: docker build -f fraud-detection-service/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/fraud-detection-service:latest .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/fraud-detection-service:latest
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/fraud-detection-service:latest