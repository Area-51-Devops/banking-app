name: Service-Discovery-CI

on:
  push:
    paths:
      - 'services/service-discovery/**'
  pull_request:
    paths:
      - 'services/service-discovery/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/service-discovery

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: services/service-discovery/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('services/service-discovery/package-lock.json') }}

      - name: Install dependencies
        run: npm install

      - name: Snyk Scan
        uses: snyk/actions/node@master
        with:
          command: test
          args: --file=services/service-discovery/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Build (optional)
        run: npm run build || echo "No build step"

      - name: Build Docker Image
        working-directory: services
        run: docker build -f service-discovery/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/service-discovery:latest .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/service-discovery:latest
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/service-discovery:latest