name: Common_CI

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string

      image_name:
        required: true
        type: string

      dockerfile_path:
        required: true
        type: string

      build_context:
        required: true
        type: string

      run_build:
        required: false
        type: boolean
        default: true

      sonar_project_key:
        required: true
        type: string

    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ${{ inputs.working_directory }}/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}

      - name: Install dependencies
        run: npm ci || npm install

      # -------- SONAR --------
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ${{ inputs.working_directory }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.projectName=${{ inputs.service_name }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        with:
          scanMetadataReportFile: ${{ inputs.working_directory }}/.scannerwork/report-task.txt
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # -------- SNYK --------
      - name: Snyk Scan
        uses: snyk/actions/node@master
        with:
          command: test
          args: --file=${{ inputs.working_directory }}/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # -------- BUILD --------
      - name: Build
        if: inputs.run_build == true
        run: npm run build || echo "No build step"

      # -------- DOCKER BUILD --------
      - name: Build Docker Image
        run: |
          docker build \
          -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:v1 \
          ${{ inputs.build_context }}

      # -------- TRIVY --------
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:v1
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      # -------- PUSH --------
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:v1