name: Common_CI

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string

      image_name:
        required: true
        type: string

      run_build:
        required: false
        type: boolean
        default: false

      sonar_project_key:
        required: true
        type: string

      docker_context:
        required: false
        type: string
        default: services

      dockerfile_path:
        required: false
        type: string
        default: ''

      service-name:
        required: true
        type: string

    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_HOST_URL:
        required: true
      SNYK_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      SMTP_HOST:
        required: true
      SMTP_PORT:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      EMAIL_TO:
        required: true

jobs:
  build:
    name: "Build & Publish - ${{ inputs.service-name }}"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ${{ inputs.working_directory }}/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles(format('{0}/package-lock.json', inputs.working_directory)) }}

      - name: Calculate Semantic Version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          tag_prefix: ${{ inputs.service-name }}-v
          dry_run: true 
          default_bump: patch

      - name: Generate Tag
        id: tag
        run: echo "tag=${{ steps.semver.outputs.new_tag }}" >> $GITHUB_OUTPUT

      - name: Validate existing tag
        id: tag_check
        run: |
          TAG=${{ steps.tag.outputs.tag }}          
          git fetch --tags origin || true

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            CURRENT_COMMIT=$(git rev-parse HEAD)

            if [ "$TAG_COMMIT" != "$CURRENT_COMMIT" ]; then
              echo "Tag exists but points to different commit!"
              exit 1
            fi

            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # -------- SONAR --------
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ${{ inputs.working_directory }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.projectName=${{ inputs.sonar_project_key }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        continue-on-error: true
        with:
          scanMetadataReportFile: ${{ inputs.working_directory }}/.scannerwork/report-task.txt
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Install dependencies
        run: npm ci || npm install

      # -------- SNYK --------
      - name: Snyk Scan
        uses: snyk/actions/node@master
        with:
          command: test
          args: --file=${{ inputs.working_directory }}/package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # -------- BUILD --------
      - name: Build
        if: inputs.run_build == true
        run: npm run build || echo "No build step"

      # -------- DOCKER BUILD --------

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Check Docker image
        id: image_check
        run: |
          if docker manifest inspect ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ steps.tag.outputs.tag }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker Image
        working-directory: ${{ inputs.working_directory }}
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ steps.tag.outputs.tag }} .

      # -------- TRIVY --------
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ steps.tag.outputs.tag }}'
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL

      # -------- PUSH --------

      - name: Push Docker Image
        if: steps.image_check.outputs.exists != 'true' && github.event_name != 'pull_request'
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ steps.tag.outputs.tag }}

      # -------- EMAIL NOTIFICATION --------
      - name: Send Email (Success)
        if: success() && github.ref == 'refs/heads/main'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Success - ${{ inputs.image_name }}"
          body: |
            Build Successful
            Image: ${{ inputs.image_name }}
            Workflow: ${{ github.workflow }}
            Repo: ${{ github.repository }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions

      - name: Send Email (Failure)
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "CI Failed - ${{ inputs.image_name }} - Run #${{ github.run_number }}"
          body: |
            CI Pipeline Execution Failed

            Service: ${{ inputs.image_name }}
            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}

            Event Type: ${{ github.event_name }}
            Branch: ${{ github.ref_name }}
            Triggered By: ${{ github.actor }}

            Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.EMAIL_TO }}
          from: GitHub Actions
