server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve files; fallback to index.html for SPA routes
  location / {
    try_files $uri /index.html;
  }

  # (Optional) Static assets cache policy
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri /index.html;
  }
}
